<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忍者転職 - テストページ</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0d1a26;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        }

        /* レスポンシブ対応の全体コンテナ */
        .lp-container {
            width: 100%;
            max-width: 1000px; 
            position: relative;
            line-height: 0;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .lp-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ーーー ふわっと動くアニメーション共通（強みカード＆横長帯） ーーー */
        .fade-card, .fade-strip {
            position: absolute;
            opacity: 0; 
            transform: translateY(20px); 
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .fade-card.active, .fade-strip.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* 【2枚目】4枚の強みカードの配置調整 */
        .fade-card { top: 17%; width: 22%; }
        .c1 { left: 3.6%; }
        .c2 { left: 27.2%; }
        .c3 { left: 50.8%; }
        .c4 { left: 74.4%; }

        /* 【4枚目】4本の横長帯の縦位置調整 */
        .fade-strip { left: 13.5%; width: 73%; }
        .s1 { top: 3.6%; }   /* 1本目の帯の高さ */
        .s2 { top: 23.6%; }  /* 2本目の帯の高さ */
        .s3 { top: 43.6%; }  /* 3本目の帯の高さ */
        .s4 { top: 63.6%; }  /* 4本目の帯の高さ */

        /* ーーー リッチな立体ボタンの共通スタイル（重複を統合してスッキリ！） ーーー */
        .real-button {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to right, #00b493, #0082b4); 
            color: #fff;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px; 
            box-shadow: 
                inset 0 2px 3px rgba(255,255,255,0.4), 
                0 6px 0 #005677, 
                0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: all 0.1s ease;
            white-space: nowrap;
            overflow: hidden; /* はみ出し防止 */
            font-size: max(12px, 1.5vw); /* 基本の文字サイズを統一コントロール */
        }

        .real-button:active {
            transform: translateY(4px);
            box-shadow: 
                inset 0 2px 3px rgba(255,255,255,0.2), 
                0 2px 0 #005677, 
                0 4px 10px rgba(0,0,0,0.4);
        }

        /* ーーー 各種CTAボタンの位置調整 ーーー */
        
        /* 1枚目：お悩みボタン */
        .btn-issue-cta { 
            width: 57%;             
            height: 9.5%;           
            left: 4%;               
            bottom: 5%;             
        }

        /* 2枚目：強みサマリボタン */
        .btn-page2 { 
            width: 90%; 
            height: 9.5%; 
            left: 5%; 
            bottom: 3.5%; 
        }

        /* 3枚目：lp004（詳細タイムライン）内の各フェーズ用ボタン */
        .btn-timeline-cta {
            width: 70%;                  
            height: 2.2%;
            left: 15%;       
            font-size: max(11px, 1.3vw); /* 長い画像に埋め込むため、文字サイズを少しだけ引き締め */
        }

        /* 各フェーズの「忍者転職なら」カード下の位置 */
        .t1 { top: 21.5%; } /* 其の一の下 */
        .t2 { top: 46.5%; } /* 其の二の下 */
        .t3 { top: 71.5%; } /* 其の三の下 */
        .t4 { top: 96.5%; } /* 其の四の下 */

        /* 4枚目：最下部ボタン */
        .btn-page4 { 
            font-size: max(16px, 2.2vw); /* 最後の押し込みのために、ここは少し目立たせる */
            width: 90%;  
            height: 9.5%; 
            left: 5%;    
            bottom: 4%;  
        }
    </style>

    <!-- GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-78685DQX0F"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-78685DQX0F');
    </script>

    <!-- Meta Pixel -->
    <script>
        !function(f,b,e,v,n,t,s){
            if(f.fbq)return;
            n=f.fbq=function(){n.callMethod?
            n.callMethod.apply(n,arguments):n.queue.push(arguments)};
            if(!f._fbq)f._fbq=n;
            n.push=n;n.loaded=!0;n.version='2.0';
            n.queue=[];t=b.createElement(e);t.async=!0;
            t.src=v;s=b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t,s)
        }(window,document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');

        fbq('init', '1855501908486093');
        fbq('track', 'PageView');
    </script>

    <!-- 計測用スクリプト -->
    <script>
        function trackLine(label){
            gtag('event','line_click',{label:label});
            fbq('trackCustom','LineClick',{label:label});
        }
    </script>
</head>
<body>

<!-- 1枚目：お悩みセクション -->
<div class="lp-container">
    <img src="lp002.png" class="lp-image" alt="こんなお悩みありませんか？">
    <a class="real-button btn-issue-cta"
       href="https://lin.ee/oNxrYEJ"
       onclick="trackLine('issue_cta')"
       target="_blank">公式LINEで無料相談する</a>
</div>

<!-- 2枚目：4つの強み一覧セクション（スクロール連動アニメーション） -->
<div class="lp-container" id="animation-section">
    <img src="lp003_bg.png" class="lp-image" alt="忍者転職の4つの強み背景">
    <img src="lp003_card1.png" class="fade-card c1" alt="強み1：1分で登録完了">
    <img src="lp003_card2.png" class="fade-card c2" alt="強み2：営業職の求人多数">
    <img src="lp003_card3.png" class="fade-card c3" alt="強み3：安心のトータルサポート">
    <img src="lp003_card4.png" class="fade-card c4" alt="強み4：圧倒的な求職者ファースト">
    <a class="real-button btn-page2"
       href="https://lin.ee/oNxrYEJ"
       onclick="trackLine('page2')"
       target="_blank">今すぐ登録して、無料相談を設定！</a>
</div>

<!-- 3枚目：強み深掘りタイムラインセクション（各フェーズにCTAを追加） -->
<div class="lp-container">
    <img src="lp004.png" class="lp-image" alt="なぜ選ばれるのか詳細タイムライン">
    
    <!-- 其の一〜其の四の「忍者転職なら」の下に配置するボタン -->
    <a class="real-button btn-timeline-cta t1" href="https://lin.ee/oNxrYEJ" onclick="trackLine('timeline_cta_1')" target="_blank">さっそく【1分】で転職活動をスタートする</a>
    <a class="real-button btn-timeline-cta t2" href="https://lin.ee/oNxrYEJ" onclick="trackLine('timeline_cta_2')" target="_blank">最速で転職活動を開始する</a>
    <a class="real-button btn-timeline-cta t3" href="https://lin.ee/oNxrYEJ" onclick="trackLine('timeline_cta_3')" target="_blank">最短で内定が出る対策を受ける</a>
    <a class="real-button btn-timeline-cta t4" href="https://lin.ee/oNxrYEJ" onclick="trackLine('timeline_cta_4')" target="_blank">入社後の最速出世キャリアを相談する</a>
</div>

<!-- 4枚目：サマリ＆最下部CTAセクション（横長帯がフワッと動く！） -->
<div class="lp-container" id="detail-section">
    <img src="lp005_bg.png" class="lp-image" alt="オフィスの背景">
    
    <!-- 重ねる4本の横長帯画像 -->
    <img src="lp005_strip1.png" class="fade-strip s1" alt="LINE登録から約1分で無料キャリア相談">
    <img src="lp005_strip2.png" class="fade-strip s2" alt="未経験でもOK！やりたい仕事が見つかる">
    <img src="lp005_strip3.png" class="fade-strip s3" alt="3年後の将来を見据えてキャリアアップを支援">
    <img src="lp005_strip4.png" class="fade-strip s4" alt="転職は面倒、そんな作業は丸投げOK！">

    <a class="real-button btn-page4"
       href="https://lin.ee/oNxrYEJ"
       onclick="trackLine('detail_cta')"
       target="_blank">まずは1分！LINEで無料キャリア相談</a>
</div>

<!-- アニメーション制御のJavaScript -->
<script>
    // 2枚目（4つの強みカード）の監視
    const section2 = document.getElementById('animation-section');
    const cards = document.querySelectorAll('.fade-card');
    const observer2 = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                cards.forEach((card, index) => {
                    setTimeout(() => { card.classList.add('active'); }, index * 200); 
                });
                observer2.unobserve(section2); 
            }
        });
    }, { threshold: 0.2 });
    observer2.observe(section2);

    // 4枚目（lp005のサマリ横長帯）の監視
    const section3 = document.getElementById('detail-section');
    const strips = document.querySelectorAll('.fade-strip');
    const observer3 = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                strips.forEach((strip, index) => {
                    setTimeout(() => { strip.classList.add('active'); }, index * 250); 
                });
                observer3.unobserve(section3); 
            }
        });
    }, { threshold: 0.2 });
    observer3.observe(section3);
</script>

</body>
</html>
