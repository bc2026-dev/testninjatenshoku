<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忍者転職 - 営業職特化の転職エージェント</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0d1a26;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        }

        /* レスポンシブ対応の全体コンテナ */
        .lp-container {
            width: 100%;
            max-width: 1000px; 
            position: relative;
            line-height: 0;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .lp-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ーーー ふわっと動くアニメーション共通（強みカード＆横長帯） ーーー */
        .fade-card, .fade-strip {
            position: absolute;
            opacity: 0; 
            transform: translateY(20px); 
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .fade-card.active, .fade-strip.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* 【1枚目】4枚の強みカードの配置調整（背景画像 lp001.png 内の最下部エリアに重ねる） */
	/* 【1枚目】4枚の強みカードの配置調整（縦並びに変更） */
        .fade-card { 
            width: 76%;       /* カードの横幅（背景画像に対しての割合。お好みで微調整してください） */
            left: 12%;        /* 左右中央に配置 (100% - 76%) / 2 */
        }
        /* top（上からの位置）の％を調整して、縦に並べます */
        .c1 { top: 78.0%; }
        .c2 { top: 81.5%; }
        .c3 { top: 85.0%; }
        .c4 { top: 88.5%; }

        /* 【3枚目（lp003）】4本の横長帯の縦位置調整 */
        .fade-strip { left: 13.5%; width: 73%; }
        .s1 { top: 3.6%; }   /* タイムライン画像の最下部（オフィス背景）に合わせた位置 */
        .s2 { top: 20.2%; }  
        .s3 { top: 36.8%; }  
        .s4 { top: 53.4%; }  

        /* ーーー リッチな立体ボタンの共通スタイル（赤色バージョン） ーーー */
        .real-button {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to right, #ff416c, #ff4b2b); /* 鮮やかな赤系グラデーション */
            color: #fff;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px; 
            box-shadow: 
                inset 0 2px 3px rgba(255,255,255,0.4), 
                0 6px 0 #b32000, /* 濃い赤の立体的な厚み */
                0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: all 0.1s ease;
            white-space: nowrap;
            overflow: hidden; 
            font-size: max(12px, 1.5vw); 
        }

        .real-button:active {
            transform: translateY(4px);
            box-shadow: 
                inset 0 2px 3px rgba(255,255,255,0.2), 
                0 2px 0 #b32000, 
                0 4px 10px rgba(0,0,0,0.4);
        }

        /* ーーー 各種CTAボタンの位置調整（個別サイズ設定を維持） ーーー */
        
        /* 1枚目：冒頭の白背景・忍者エリアのファーストCTA */
        .btn-top-white-cta {
            width: 70%;
            height: 3.8%;
            left: 19%;
            top: 9.0%; 
            font-size: max(16px, 2.8vw); 
        }

        /* 1枚目：お悩みセクション直下のボタン */
        .btn-issue-cta { 
            width: 70%;             
            height: 2%;           
            left: 4%;               
            top: 42.0%;             
            font-size: max(16px, 2.8vw); 
        }

        /* 1枚目：強みサマリ下の登録ボタン（一番下） */
        .btn-page2 { 
            width: 80%; 
            height: 2%; 
            left: 11%; 
            bottom: 4.5%; 
            font-size: max(16px, 2.8vw); 
        }

        /* 2枚目：lp002（詳細タイムライン）内の各フェーズ用ボタン（4つ共通） */
        .btn-timeline-cta {
            width: 77%;                  
            height: 2.2%;
            left: 15%;       
            font-size: max(12px, 2.2vw); 
        }
        .t1 { top: 21.5%; } 
        .t2 { top: 46.0%; } 
        .t3 { top: 69.5%; } 
        .t4 { top: 94.0%; } 

        /* 3枚目：最下部ボタン（画像 lp003.png 内の「白い余白」部分に％で重ねる調整） */
        .btn-page4 { 
            width: 90%;  
            height: 12.5%;      /* 新しい lp003.png の縦幅に対するボタンの高さ比率（※適宜微調整してください） */
            left: 5%;    
            bottom: 8.0%;       /* 画像の下部に新設された「白い余白」の真ん中に来るように配置 */
            font-size: max(18px, 2.5vw); 
        }
    </style>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-78685DQX0F"></script>

<script>
        // ① LINEボタンのクリック計測（場所の特定 ＆ MetaのAI学習）
        function trackLine(label){
            // GA4へ「どのボタンが押されたか」を送信
            gtag('event', 'line_click', { 'label': label });
            
            // Metaへカスタムイベントとして送信（管理画面での確認用）
            fbq('trackCustom', 'LineClick', { 'label': label });
            
            // MetaのAIに「LINE登録（成果）」として学習させるための標準イベント（Lead）
            fbq('track', 'SubmitApplication', { content_name: label });
        }

        // ② スクロール率（50% / 90%）の計測スクリプト
        // 同じユーザーが何度も同じパーセンテージを送信しないようにする防衛策（フラグ）
        let scrolled50 = false;
        let scrolled90 = false;

        window.addEventListener('scroll', function() {
            // ページの総高さ、現在のスクロール位置、画面の表示領域の高さから計算
            const scrollableHeight = document.documentElement.scrollHeight - window.innerHeight;
            if (scrollableHeight <= 0) return; // スクロールできない場合は処理しない

            const scrolledPercentage = (window.scrollY / scrollableHeight) * 100;

            // 50%に達した瞬間（1回のみ発火）
            if (scrolledPercentage >= 50 && !scrolled50) {
                scrolled50 = true;
                // GA4に送信
                gtag('event', 'scroll_depth', { 'percentage': '50%' });
                // Metaに送信（カスタムイベント）
                fbq('trackCustom', 'ScrollDepth', { 'percentage': '50%' });
            }

            // 90%に達した瞬間（1回のみ発火）
            if (scrolledPercentage >= 90 && !scrolled90) {
                scrolled90 = true;
                // GA4に送信
                gtag('event', 'scroll_depth', { 'percentage': '90%' });
                // Metaに送信（カスタムイベント）
                fbq('trackCustom', 'ScrollDepth', { 'percentage': '90%' });
            }
        });
    </script>

</head>
<body>

<div class="lp-container" id="animation-section">
    <img src="lp001.png" class="lp-image" alt="忍者転職 メインセクション">
    
    <a class="real-button btn-top-white-cta"
       href="https://lin.ee/oNxrYEJ"
       onclick="trackLine('top_white_cta')"
       target="_blank">【1分】LINE無料相談！</a>

    <a class="real-button btn-issue-cta"
       href="https://lin.ee/oNxrYEJ"
       onclick="trackLine('issue_cta')"
       target="_blank">【1分】LINE無料相談！</a>

    <img src="lp001_card1.png" class="fade-card c1" alt="強み1：1分で登録完了">
    <img src="lp001_card2.png" class="fade-card c2" alt="強み2：営業職の求人多数">
    <img src="lp001_card3.png" class="fade-card c3" alt="強み3：安心のトータルサポート">
    <img src="lp001_card4.png" class="fade-card c4" alt="強み4：新キャリアでの活躍の保証">

    <a class="real-button btn-page2"
       href="https://lin.ee/oNxrYEJ"
       onclick="trackLine('page2')"
       target="_blank">【1分】LINE無料相談！</a>
</div>

<div class="lp-container">
    <img src="lp002.png" class="lp-image" alt="なぜ選ばれるのか詳細タイムライン">
    
    <a class="real-button btn-timeline-cta t1" href="https://lin.ee/oNxrYEJ" onclick="trackLine('timeline_cta_1')" target="_blank">【1分】で転職活動をスタートする</a>
    <a class="real-button btn-timeline-cta t2" href="https://lin.ee/oNxrYEJ" onclick="trackLine('timeline_cta_2')" target="_blank">最速で転職活動を開始する</a>
    <a class="real-button btn-timeline-cta t3" href="https://lin.ee/oNxrYEJ" onclick="trackLine('timeline_cta_3')" target="_blank">最短で内定が出る対策を受ける</a>
    <a class="real-button btn-timeline-cta t4" href="https://lin.ee/oNxrYEJ" onclick="trackLine('timeline_cta_4')" target="_blank">入社後の最速出世キャリアを相談する</a>
</div>

<div class="lp-container" id="detail-section">
    <img src="lp003.png" class="lp-image" alt="オフィスの背景と特設余白エリア">

    <img src="lp005_strip1.png" class="fade-strip s1" alt="LINE登録から約1分で無料キャリア相談">
    <img src="lp005_strip2.png" class="fade-strip s2" alt="3年後の将来を見据えて長期的キャリアアップを支援">
    <img src="lp005_strip3.png" class="fade-strip s3" alt="「転職は面倒」そんな作業は担当エージェントに丸投げOK！">
    <img src="lp005_strip4.png" class="fade-strip s4" alt="未経験でもOK！営業のプロによるマッチング">

    <a class="real-button btn-page4"
       href="https://lin.ee/oNxrYEJ"
       onclick="trackLine('detail_cta')"
       target="_blank">まずは【1分】LINEで無料キャリア相談</a>
</div>

<script>
    // 1枚目の強みカード群の監視
    const section2 = document.getElementById('animation-section');
    const cards = document.querySelectorAll('.fade-card');
    const observer2 = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                cards.forEach((card, index) => {
                    setTimeout(() => { card.classList.add('active'); }, index * 200); 
                });
                observer2.unobserve(section2); 
            }
        });
    }, { threshold: 0.1 });
    observer2.observe(section2);

    // 3枚目（サマリ横長帯）の監視
    const section3 = document.getElementById('detail-section');
    const strips = document.querySelectorAll('.fade-strip');
    const observer3 = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                strips.forEach((strip, index) => {
                    setTimeout(() => { strip.classList.add('active'); }, index * 250); 
                });
                observer3.unobserve(section3); 
            }
        });
    }, { threshold: 0.3 }); // 発火タイミングを適正化
    observer3.observe(section3);
</script>

</body>
</html>
