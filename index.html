<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忍者転職 - テストページ</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0d1a26;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        }

        /* レスポンシブ対応の全体コンテナ */
        .lp-container {
            width: 100%;
            max-width: 1000px; 
            position: relative;
            line-height: 0;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .lp-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ーーー ふわっと動くアニメーション共通（強みカード＆横長帯） ーーー */
        .fade-card, .fade-strip {
            position: absolute;
            opacity: 0; 
            transform: translateY(20px); 
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .fade-card.active, .fade-strip.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* 【1枚目】4枚の強みカードの配置調整（背景画像 lp001.png 内の最下部エリアに重ねる） */
        .fade-card { bottom: 10%; width: 22%; }
        .c1 { left: 3.6%; }
        .c2 { left: 27.2%; }
        .c3 { left: 50.8%; }
        .c4 { left: 74.4%; }

        /* 【2枚目（統合エリア内）】4本の横長帯の縦位置調整 */
        .fade-strip { left: 13.5%; width: 73%; }
        .s1 { top: 85.5%; }   /* タイムライン画像の最下部（オフィス背景）に合わせた位置 */
        .s2 { top: 88.0%; }  
        .s3 { top: 90.5%; }  
        .s4 { top: 93.0%; }  

        /* ーーー リッチな立体ボタンの共通スタイル（赤色バージョン） ーーー */
        .real-button {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to right, #ff416c, #ff4b2b); /* 鮮やかな赤系グラデーション */
            color: #fff;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px; 
            box-shadow: 
                inset 0 2px 3px rgba(255,255,255,0.4), 
                0 6px 0 #b32000, /* 濃い赤の立体的な厚み */
                0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: all 0.1s ease;
            white-space: nowrap;
            overflow: hidden; 
            font-size: max(12px, 1.5vw); 
        }

        .real-button:active {
            transform: translateY(4px);
            box-shadow: 
                inset 0 2px 3px rgba(255,255,255,0.2), 
                0 2px 0 #b32000, 
                0 4px 10px rgba(0,0,0,0.4);
        }

/* ーーー 各種CTAボタンの位置調整（画像に対する％指定） ーーー */
        
        /* 1枚目：冒頭の白背景・忍者エリアのファーストCTA */
        .btn-top-white-cta {
            width: 57%;
            height: 3.8%;
            left: 19%;
            top: 16.5%; 
            font-size: max(16px, 3.5vw); /* 👈 【追加】このボタンだけの文字サイズ */
        }

        /* 1枚目：お悩みセクション直下のボタン */
        .btn-issue-cta { 
            width: 57%;             
            height: 2%;           
            left: 4%;               
            top: 56.5%;             
            font-size: max(16px, 3.0vw); /* 👈 【追加】このボタンだけの文字サイズ */
        }

        /* 1枚目：強みサマリ下の登録ボタン（一番下） */
        .btn-page2 { 
            width: 90%; 
            height: 2%; 
            left: 5%; 
            bottom: 7.5%; 
            font-size: max(16px, 3.5vw); /* 👈 【追加】このボタンだけの文字サイズ */
        }

        /* 2枚目：lp002（詳細タイムライン）内の各フェーズ用ボタン（4つ共通） */
        .btn-timeline-cta {
            width: 70%;                  
            height: 2.2%;
            left: 15%;       
            font-size: max(11px, 1.8vw); /* 👈 ここは枠からはみ出さないように、少し小さめにしておくのが安全です！ */
        }
        .t1 { top: 18.0%; } 
        .t2 { top: 38.5%; } 
        .t3 { top: 59.0%; } 
        .t4 { top: 80.0%; } 

        /* 2枚目：最下部ボタン（白背景のエリアの中） */
        .btn-page4 { 
            width: 90%;  
            height: 100px;      
            left: 5%;    
            top: 50%;          
            transform: translateY(-50%); 
            font-size: max(18px, 2.5vw); /* 👈 【追加】一番最後のボタンはさらに大きく！ */
        }

        /* 白背景用のクリック沈み込みアニメーション微調整 */
        .btn-page4:active {
            transform: translateY(-46px); 
        }
    </style>

    <!-- GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-78685DQX0F"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-78685DQX0F');
    </script>

    <!-- Meta Pixel -->
    <script>
        !function(f,b,e,v,n,t,s){
            if(f.fbq)return;
            n=f.fbq=function(){n.callMethod?
            n.callMethod.apply(n,arguments):n.queue.push(arguments)};
            if(!f._fbq)f._fbq=n;
            n.push=n;n.loaded=!0;n.version='2.0';
            n.queue=[];t=b.createElement(e);t.async=!0;
            t.src=v;s=b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t,s)
        }(window,document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');

        fbq('init', '1855501908486093');
        fbq('track', 'PageView');
    </script>

    <!-- 計測用スクリプト -->
    <script>
        function trackLine(label){
            gtag('event','line_click',{label:label});
            fbq('trackCustom','LineClick',{label:label});
        }
    </script>
</head>
<body>

<!-- 1枚目：お悩み〜強みサマリ（白背景CTA＆強みカードアニメーション内包） -->
<div class="lp-container" id="animation-section">
    <img src="lp001.png" class="lp-image" alt="忍者転職 メインセクション">
    
    <!-- 冒頭の白背景・忍者エリアのファーストCTA -->
    <a class="real-button btn-top-white-cta"
       href="https://lin.ee/oNxrYEJ"
       onclick="trackLine('top_white_cta')"
       target="_blank">【1分】LINE無料相談！</a>

    <!-- お悩みパート直下のCTA -->
    <a class="real-button btn-issue-cta"
       href="https://lin.ee/oNxrYEJ"
       onclick="trackLine('issue_cta')"
       target="_blank">【1分】LINE無料相談！</a>

    <!-- 時間差でフワッと浮かび上がる4つの強みカード -->
    <img src="lp001_card1.png" class="fade-card c1" alt="強み1：1分で登録完了">
    <img src="lp001_card2.png" class="fade-card c2" alt="強み2：営業職の求人多数">
    <img src="lp001_card3.png" class="fade-card c3" alt="強み3：安心のトータルサポート">
    <img src="lp001_card4.png" class="fade-card c4" alt="強み4：新キャリアでの活躍の保証">

    <!-- 強みカードの下の登録ボタン -->
    <a class="real-button btn-page2"
       href="https://lin.ee/oNxrYEJ"
       onclick="trackLine('page2')"
       target="_blank">【1分】LINE無料相談！</a>
</div>

<!-- 2枚目：詳細タイムライン＆サマリ横長帯セクション（統合して背景のダブりを解消！） -->
<div class="lp-container" id="detail-section">
    <!-- 背景は、下部にオフィスデザインが印刷されている lp002.png 1枚のみ -->
    <img src="lp002.png" class="lp-image" alt="なぜ選ばれるのか詳細タイムライン">
    
    <!-- タイムライン各フェーズのボタン -->
    <a class="real-button btn-timeline-cta t1" href="https://lin.ee/oNxrYEJ" onclick="trackLine('timeline_cta_1')" target="_blank">さっそく【1分】で転職活動をスタートする</a>
    <a class="real-button btn-timeline-cta t2" href="https://lin.ee/oNxrYEJ" onclick="trackLine('timeline_cta_2')" target="_blank">最速で転職活動を開始する</a>
    <a class="real-button btn-timeline-cta t3" href="https://lin.ee/oNxrYEJ" onclick="trackLine('timeline_cta_3')" target="_blank">最短で内定が出る対策を受ける</a>
    <a class="real-button btn-timeline-cta t4" href="https://lin.ee/oNxrYEJ" onclick="trackLine('timeline_cta_4')" target="_blank">入社後の最速出世キャリアを相談する</a>

    <!-- 画像の最下部（オフィス背景部分）に重なってフワッと動く4本の横長帯 -->
    <img src="lp005_strip1.png" class="fade-strip s1" alt="LINE登録から約1分で無料キャリア相談">
    <img src="lp005_strip2.png" class="fade-strip s2" alt="3年後の将来を見据えて長期的キャリアアップを支援">
    <img src="lp005_strip3.png" class="fade-strip s3" alt="「転職は面倒」そんな作業は担当エージェントに丸投げOK！">
    <img src="lp005_strip4.png" class="fade-strip s4" alt="未経験でもOK！営業のプロによるマッチング">

    <!-- 💡【新設】画像の最下部にピタッと結合する、真っ白な背景の特設エリア -->
    <div style="background-color: #ffffff; width: 100%; height: 250px; position: relative; margin-top: -1px; line-height: normal;">
        <!-- 一番最後の最下部ボタンを、この白背景の中に引っ越しさせました -->
        <a class="real-button btn-page4"
           href="https://lin.ee/oNxrYEJ"
           onclick="trackLine('detail_cta')"
           target="_blank">まずは【1分】LINEで無料キャリア相談</a>
    </div>
</div>

<!-- アニメーション制御のJavaScript -->
<script>
    // 1枚目の強みカード群の監視
    const section2 = document.getElementById('animation-section');
    const cards = document.querySelectorAll('.fade-card');
    const observer2 = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                cards.forEach((card, index) => {
                    setTimeout(() => { card.classList.add('active'); }, index * 200); 
                });
                observer2.unobserve(section2); 
            }
        });
    }, { threshold: 0.1 });
    observer2.observe(section2);

    // 2枚目下部（サマリ横長帯）の監視
    const section3 = document.getElementById('detail-section');
    const strips = document.querySelectorAll('.fade-strip');
    const observer3 = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                strips.forEach((strip, index) => {
                    setTimeout(() => { strip.classList.add('active'); }, index * 250); 
                });
                observer3.unobserve(section3); 
            }
        });
    }, { threshold: 0.4 }); // 非常に縦に長い画像になったため、発火タイミングを調整
    observer3.observe(section3);
</script>

</body>
</html>
